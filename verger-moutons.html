<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Moutons">
<meta name="theme-color" content="#3F6B3A">
<title>Verger des moutons — suivi des arbres</title>
<style>
  :root{
    --paper:#FBF9F4; --paper2:#F3EFE6; --ink:#2A2620; --ink2:#6B6457;
    --line:#E3DCCD; --leaf:#3F6B3A;
    --pommier:#C24A3A; --poirier:#7B863F; --prunier:#7A5A9E; --cerisier:#A11D42; --preciser:#A8A090;
    --watch:#D98A00; --replace:#8A6FB0; --dead:#8E8678;
    --shadow:0 8px 30px rgba(42,38,32,.16);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-size:16px;line-height:1.45;
    padding-bottom:env(safe-area-inset-bottom);padding-top:env(safe-area-inset-top)}
  h1,h2,h3{font-family:Georgia,"Times New Roman",serif;font-weight:600;margin:0}
  .wrap{max-width:820px;margin:0 auto;padding:14px}
  header{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px}
  header h1{font-size:22px;letter-spacing:.2px;line-height:1.1}
  header .sub{color:var(--ink2);font-size:13px}
  .grow{flex:1 1 auto}
  .sync{font-size:12.5px;padding:6px 11px;border-radius:999px;border:1px solid var(--line);background:#fff;white-space:nowrap;cursor:pointer}
  .sync.ok{color:var(--leaf);border-color:#cfe0cb;background:#eef5ec}
  .sync.busy{color:#7a5a00;border-color:#e6c389;background:#fdf3e0}
  .sync.off{color:var(--ink2)}
  .sync.err{color:#9a3b2e;border-color:#e3b3aa;background:#f7e4df}

  button{font:inherit;cursor:pointer}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 12px}
  .btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 13px;font-size:14px;color:var(--ink);font-weight:600}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--leaf);border-color:var(--leaf);color:#fff}
  .btn.ghost{background:transparent}
  .btn.add{border-style:dashed}

  .stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px 12px;min-width:74px}
  .stat b{font-family:Georgia,serif;font-size:20px;display:block;line-height:1}
  .stat span{font-size:11.5px;color:var(--ink2);text-transform:uppercase;letter-spacing:.4px}
  .stat.watch b{color:var(--watch)} .stat.replace b{color:var(--replace)}

  .bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
  .bar .lab{font-size:12.5px;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px}
  .seg{display:inline-flex;flex-wrap:wrap;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff}
  .seg button{border:0;background:transparent;padding:7px 11px;font-size:13px;color:var(--ink2);font-weight:600}
  .seg button.on{background:var(--ink);color:var(--paper)}
  .chipsflt{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .fchip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 12px;font-size:13px;font-weight:600;color:var(--ink2)}
  .fchip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}

  .rowhead{font-family:Georgia,serif;font-size:15px;font-weight:600;color:var(--ink);margin:14px 2px 6px;display:flex;align-items:center;gap:8px}
  .rowhead:first-child{margin-top:0}
  .rowhead .n{font:600 12px system-ui;color:var(--ink2)}
  .list{display:flex;flex-direction:column;gap:8px}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;margin-top:6px}
  .col{display:flex;flex-direction:column;gap:22px;align-items:center}
  .colhead{font-family:Georgia,serif;font-size:14px;font-weight:600;color:var(--ink);text-align:center;padding:0 0 6px}
  .colhead .n{font:600 11px system-ui;color:var(--ink2)}
  .tile{width:100%;max-width:132px;aspect-ratio:1/1.06;border-radius:14px;color:#fff;padding:9px 10px;display:flex;flex-direction:column;cursor:pointer;overflow:hidden;box-shadow:0 2px 6px rgba(42,38,32,.15)}
  .tile:active{transform:translateY(1px)}
  .tile.dim{opacity:.4}
  .tile .top{display:flex;align-items:center;gap:6px;min-height:16px}
  .tile .tcode{font:700 10px system-ui;letter-spacing:.4px;background:rgba(255,255,255,.22);border-radius:5px;padding:1px 6px}
  .tile .trgf{font:700 8.5px system-ui;background:rgba(255,255,255,.92);color:#4a3d17;border-radius:4px;padding:1px 4px;margin-left:auto}
  .tile .tname{font-family:Georgia,serif;font-size:13px;line-height:1.13;font-weight:600;flex:1 1 auto;display:flex;align-items:center;margin-top:6px}
  .tile .tsub{font:600 9.5px system-ui;opacity:.9;letter-spacing:.2px}
  .card{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-left:6px solid var(--line);border-radius:13px;padding:11px 13px;cursor:pointer}
  .card:active{transform:translateY(1px)}
  .card .ref{font:700 12px system-ui;color:#fff;background:var(--ink2);border-radius:7px;padding:4px 7px;min-width:40px;text-align:center}
  .card .main{flex:1 1 auto;min-width:0}
  .card .nm{font-family:Georgia,serif;font-size:16px;line-height:1.15}
  .card .nm .rgf{font:700 9.5px system-ui;color:#7a5a00;background:#f7ecd0;border:1px solid #e6d59a;border-radius:5px;padding:1px 5px;margin-left:6px;vertical-align:2px}
  .card .meta{font-size:12.5px;color:var(--ink2);margin-top:2px}
  .card .rec{white-space:nowrap;font:600 12px system-ui;color:var(--ink2);text-align:right}
  .card.dim{opacity:.4}
  .card .sdot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}

  .alerts{margin-top:18px}
  .alerts h2{font-size:16px;margin-bottom:8px}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 11px;font-size:13px;display:inline-flex;align-items:center;gap:7px}
  .chip b{font-family:Georgia,serif}
  .chip .pip{width:8px;height:8px;border-radius:50%}
  .muted{color:var(--ink2);font-size:13.5px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin:2px 2px 12px;font-size:12.5px;color:var(--ink2)}
  .legend i{display:inline-block;width:13px;height:13px;border-radius:4px;margin-right:6px;vertical-align:-2px;border:1.5px solid rgba(0,0,0,.12)}

  .scrim{position:fixed;inset:0;background:rgba(30,26,20,.45);opacity:0;pointer-events:none;transition:opacity .2s;z-index:20}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:21;background:var(--paper);border-radius:18px 18px 0 0;box-shadow:var(--shadow);
    transform:translateY(100%);transition:transform .26s cubic-bezier(.22,.61,.36,1);max-height:92vh;overflow:auto;padding-bottom:env(safe-area-inset-bottom)}
  .sheet.open{transform:translateY(0)}
  @media(min-width:680px){.sheet{left:50%;right:auto;bottom:24px;width:560px;transform:translate(-50%,140%);border-radius:18px}.sheet.open{transform:translate(-50%,0)}}
  .sheet .pad{padding:18px}
  .sheet .grab{width:40px;height:4px;border-radius:2px;background:var(--line);margin:10px auto 0}
  .sheet-head{display:flex;align-items:flex-start;gap:12px}
  .sheet-head .idbadge{font:700 14px system-ui;color:#fff;background:var(--leaf);border-radius:10px;padding:7px 10px;min-width:46px;text-align:center}
  .sheet-head h2{font-size:20px;line-height:1.1}
  .sheet-head .esp{font-size:13px;color:var(--ink2)}
  .closex{margin-left:auto;border:0;background:transparent;font-size:24px;line-height:1;color:var(--ink2);padding:2px 6px}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;color:#fff;margin-left:6px;vertical-align:2px}

  .field{margin-top:14px}
  .field label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink2);margin-bottom:5px}
  select,input[type=text],input[type=date],textarea{width:100%;font:inherit;padding:11px 12px;border:1px solid var(--line);border-radius:11px;background:#fff;color:var(--ink)}
  textarea{min-height:64px;resize:vertical}
  .row2{display:flex;gap:10px}.row2>*{flex:1}

  .timeline{margin-top:16px;border-top:1px solid var(--line);padding-top:14px}
  .timeline h3{font-size:15px;margin-bottom:10px}
  .ev{display:flex;gap:11px;padding:10px 0;border-bottom:1px dashed var(--line)}
  .ev:last-child{border-bottom:0}
  .ev .when{font:700 12px system-ui;color:var(--ink2);min-width:78px;padding-top:2px}
  .ev .what b{display:block;font-size:14px}
  .ev .what span{font-size:13.5px;color:var(--ink)}
  .ev .type-pip{font-size:11px;font-weight:700;color:#fff;border-radius:6px;padding:1px 7px;display:inline-block;margin-bottom:3px}
  .ev .del{margin-left:auto;border:0;background:transparent;color:#b23a2e;font-size:12px;align-self:center}
  .none{color:var(--ink2);font-size:13.5px;font-style:italic}
  .addbox{margin-top:14px;background:var(--paper2);border:1px solid var(--line);border-radius:14px;padding:14px}
  .addbox h3{font-size:14px;margin-bottom:6px}
  .addbox .btn.primary{width:100%;margin-top:12px;padding:12px}
  .delbtn{margin-top:14px;width:100%;border:1px solid #e3b3aa;background:#fff;color:#9a3b2e;border-radius:11px;padding:11px;font-weight:600}

  .seth h2{font-size:19px}
  .step{margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
  .step h3{font-size:14px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink2)}
  .pill{display:inline-block;font-size:12px;font-weight:700;padding:3px 9px;border-radius:999px;margin-bottom:8px}
  .pill.on{background:#eef5ec;color:var(--leaf);border:1px solid #cfe0cb}
  .pill.offp{background:#f3efe6;color:var(--ink2);border:1px solid var(--line)}
  .help{font-size:13px;color:var(--ink2);line-height:1.5}
  .help code{background:#fff;border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-size:12.5px}
  .footnote{margin:22px 2px 8px;color:var(--ink2);font-size:12px;line-height:1.5}
  .hidden{display:none!important}
  a{color:var(--leaf)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Verger des moutons</h1>
      <div class="sub">Suivi individuel des arbres · collection fruitière · 2 rangées</div>
    </div>
    <div class="grow"></div>
    <span id="syncBadge" class="sync off">○ Local</span>
  </header>

  <div class="toolbar">
    <button class="btn primary" id="btnSettings">⚙︎ Dropbox</button>
    <button class="btn" id="btnPDF">⎙ Liste PDF</button>
    <button class="btn" id="btnExport">⤓ Sauvegarde manuelle</button>
    <button class="btn" id="btnImport">⤒ Importer</button>
    <input type="file" id="fileInput" accept="application/json,.json" class="hidden">
    <button class="btn ghost" id="btnReset">Réinitialiser</button>
  </div>

  <div class="stats" id="stats"></div>

  <div class="bar">
    <span class="lab">Couleur</span>
    <div class="seg" id="modeSeg">
      <button data-mode="espece" class="on">Espèce</button>
      <button data-mode="campagne">Campagne</button>
      <button data-mode="statut">Statut</button>
      <button data-mode="alertes">Alertes</button>
    </div>
    <button class="btn add" id="btnAdd" style="margin-left:auto">＋ Arbre</button>
  </div>
  <div class="chipsflt" id="filter"></div>
  <div class="legend" id="legend"></div>

  <div class="list" id="list"></div>

  <div class="alerts">
    <h2>À surveiller / à intervenir</h2>
    <div class="chips" id="alertChips"></div>
  </div>

  <p class="footnote" id="foot"></p>
</div>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"><div class="grab"></div><div class="pad" id="sheetBody"></div></div>

<div class="scrim" id="scrim2"></div>
<div class="sheet seth" id="sheet2"><div class="grab"></div><div class="pad" id="setBody"></div></div>

<script>
/* ===================== Données du verger — 2 rangées =====================
   [variété, espèce, fenêtre cueillette-conservation, RGF] */
const ROWS={
 A:[
  ["Général Leclerc","Poirier","10 - 12",false,"Novembre 2011"],
  ["Griotte de Schaerbeek","Cerisier","7 - 8",false,"Novembre 2011"],
  ["Président Van Dievoet","Pommier","10 - 05",true,"Mars 2010"],
  ["Transparente Blanche","Pommier","7 - 8",false,"Mars 2011"],
  ["Grenadier","Pommier","8 - 9",true,"Mars 2011"],
  ["Reinette de Blenheim","Pommier","10 - 01",true,"Novembre 2011"],
  ["Reinette Étoilée","Pommier","9 - 12",false,"Mars 2010"],
  ["Belle-Fleur Double","Pommier","9 - 12",false,"Mars 2011"],
  ["Court-Pendu","Pommier","10 - 02",false,"Mars 2010"],
  ["Triomphe de Vienne","Poirier","9 - 10",false,"Novembre 2011"],
  ["Ananas de Courtrai","Poirier","8 - 9",false,"Novembre 2011"],
  ["Sainte-Catherine","Prunier","9 - 10",true,"Novembre 2011"],
  ["Joséphine de Malines","Poirier","10 - 02",false,"Novembre 2008"],
  ["Wignon","Prunier","9 - 10",true,"Février 2011"],
  ["Abbesse de Mouland","Cerisier","7 - 7",false,"Février 2011"]
 ],
 B:[
  ["Le Lectier","Poirier","10 - 12",false,"Mars 2011"],
  ["Poire de Grise","Poirier","",false,"Novembre 2011"],
  ["Reinette de Caux","Pommier","12 - 03",false,"Novembre 2011"],
  ["Président Roulin","Pommier","9 - 12",true,"Mars 2011"],
  ["Cwastresse Double","Pommier","9 - 11",true,"Mars 2010"],
  ["Belle-Fleur à Large Mouche","Pommier","9 - 03",false,"Novembre 2011"],
  ["Belle-Fleur Simple","Pommier","10 - 03",false,"Novembre 2011"],
  ["Reinette de Waleffe","Pommier","10 - 04",true,"Novembre 2011"],
  ["Comtesse de Paris","Poirier","10 - 01",false,"Mars 2011"],
  ["Beurré Lebrun","Poirier","9 - 10",false,"Novembre 2011"],
  ["Belle de Thuin","Prunier","8 - 9",true,"Novembre 2011"],
  ["Prune de Prince","Prunier","9 - 10",true,"Mars 2010"],
  ["Légipont","Poirier","10 - 11",false,"Février 2011"]
 ]
};
const YEAR_PALETTE=["#3F6B3A","#C9883A","#8A6FB0","#2E6E8A","#B23A2E","#6B8E3D","#9A7C1E","#5A7D9A"];
const MOIS={"janvier":1,"février":2,"fevrier":2,"mars":3,"avril":4,"mai":5,"juin":6,"juillet":7,"août":8,"aout":8,"septembre":9,"octobre":10,"novembre":11,"décembre":12,"decembre":12};
const RANGS=["A","B"];
const ESPECES_BASE=["Pommier","Poirier","Prunier","Cerisier","À préciser"];
const ESP_COLOR={"Pommier":"var(--pommier)","Poirier":"var(--poirier)","Prunier":"var(--prunier)","Cerisier":"var(--cerisier)","À préciser":"var(--preciser)"};
const ESP_HEX={"Pommier":"#C24A3A","Poirier":"#7B863F","Prunier":"#7A5A9E","Cerisier":"#A11D42","À préciser":"#A8A090"};
const STATUT_HEX={"Vivant":"#3F6B3A","À surveiller":"#D98A00","À remplacer":"#8A6FB0","Remplacé":"#8E8678","Mort":"#8E8678"};
const STATUTS=["Vivant","À surveiller","À remplacer","Remplacé","Mort"];
const STATUT_COLOR={"Vivant":"--leaf","À surveiller":"--watch","À remplacer":"--replace","Remplacé":"--dead","Mort":"--dead"};
const EVENT_TYPES=["Plantation","Remplacement","Maladie / Chancre","Taille","Taille sévère","Blessure","Bris de branche","Traitement","Floraison","Récolte","Greffe","Observation"];
const TYPE_COLOR={"Plantation":"#3F6B3A","Remplacement":"#8A6FB0","Maladie / Chancre":"#B23A2E","Taille":"#6B6457","Taille sévère":"#8a4b00","Blessure":"#C06000","Bris de branche":"#9A3B2E","Traitement":"#2E6E8A","Floraison":"#B07AA0","Récolte":"#9A7C1E","Greffe":"#4E7C59","Observation":"#6B6457"};

/* ===================== Dropbox (OAuth PKCE, sans serveur) ===================== */
function b64url(b){let s=btoa(String.fromCharCode.apply(null,b));return s.replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");}
const DBX_FILE="/verger-moutons.json";
const DBX={
  get key(){return localStorage.getItem("dbxm_app_key")||"";},
  set key(v){localStorage.setItem("dbxm_app_key",(v||"").trim());},
  get connected(){return !!localStorage.getItem("dbxm_refresh") && !!this.key;},
  rand(n){const a=new Uint8Array(n);crypto.getRandomValues(a);return b64url(a).slice(0,n);},
  async challenge(v){const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(v));return b64url(new Uint8Array(buf));},
  async authUrl(){
    const v=this.rand(96);localStorage.setItem("dbxm_verifier",v);
    const c=await this.challenge(v);
    const u=new URL("https://www.dropbox.com/oauth2/authorize");
    u.searchParams.set("client_id",this.key);u.searchParams.set("response_type","code");
    u.searchParams.set("code_challenge",c);u.searchParams.set("code_challenge_method","S256");
    u.searchParams.set("token_access_type","offline");
    return u.toString();
  },
  async finish(code){
    const v=localStorage.getItem("dbxm_verifier")||"";
    const body=new URLSearchParams({code:code.trim(),grant_type:"authorization_code",code_verifier:v,client_id:this.key});
    const r=await fetch("https://api.dropboxapi.com/oauth2/token",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body});
    const j=await r.json();
    if(!j.refresh_token) throw new Error(j.error_description||j.error||"échec");
    localStorage.setItem("dbxm_refresh",j.refresh_token);localStorage.setItem("dbxm_access",j.access_token);
    localStorage.setItem("dbxm_expiry",String(Date.now()+j.expires_in*1000-60000));localStorage.removeItem("dbxm_verifier");
  },
  async token(){
    const acc=localStorage.getItem("dbxm_access"),exp=+localStorage.getItem("dbxm_expiry")||0;
    if(acc && Date.now()<exp) return acc;
    const refresh=localStorage.getItem("dbxm_refresh");
    if(!refresh) throw new Error("non connecté");
    const body=new URLSearchParams({grant_type:"refresh_token",refresh_token:refresh,client_id:this.key});
    const r=await fetch("https://api.dropboxapi.com/oauth2/token",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body});
    const j=await r.json();
    if(!j.access_token) throw new Error("rafraîchissement échoué");
    localStorage.setItem("dbxm_access",j.access_token);localStorage.setItem("dbxm_expiry",String(Date.now()+j.expires_in*1000-60000));
    return j.access_token;
  },
  async download(){
    const t=await this.token();
    const r=await fetch("https://content.dropboxapi.com/2/files/download",{method:"POST",
      headers:{"Authorization":"Bearer "+t,"Dropbox-API-Arg":JSON.stringify({path:DBX_FILE})}});
    if(r.status===409) return null;
    if(!r.ok) throw new Error("download "+r.status);
    return await r.text();
  },
  async upload(text){
    const t=await this.token();
    const r=await fetch("https://content.dropboxapi.com/2/files/upload",{method:"POST",
      headers:{"Authorization":"Bearer "+t,"Dropbox-API-Arg":JSON.stringify({path:DBX_FILE,mode:"overwrite",mute:true}),"Content-Type":"application/octet-stream"},
      body:text});
    if(!r.ok) throw new Error("upload "+r.status);
  },
  disconnect(){["dbxm_refresh","dbxm_access","dbxm_expiry","dbxm_verifier"].forEach(k=>localStorage.removeItem(k));}
};

/* ===================== État ===================== */
const LS_KEY="verger_moutons_v1";
let state=null,currentId=null,mode="espece",filterEsp=null,syncTimer=null,curCampMap={};
function campKey(s){const m=/([a-zéûôàA-Z]+)\s+(\d{4})/.exec((s||"").toLowerCase());if(!m)return 999999;return (+m[2])*100+(MOIS[m[1]]||0);}
function campMap(){const cs=Array.from(new Set(Object.values(state.trees).map(t=>(t.anneePlantation||"").trim()).filter(Boolean)));cs.sort((a,b)=>campKey(a)-campKey(b));const m={};cs.forEach((c,i)=>m[c]=YEAR_PALETTE[i%YEAR_PALETTE.length]);return m;}

function buildDefault(){
  const trees={};
  RANGS.forEach(r=>ROWS[r].forEach((s,i)=>{
    const col=i+1,id=r+col;
    const events=s[4]?[{date:s[4],type:"Plantation",desc:"Plantation initiale"}]:[];
    trees[id]={id,rang:r,col,variete:s[0],espece:s[1],fenetre:s[2],rgf:s[3],statut:"Vivant",anneePlantation:s[4]||"",events};
  }));
  return {meta:{nom:"Verger des moutons",maj:new Date().toISOString(),version:2},especes:ESPECES_BASE.slice(),trees};
}
function normalize(s){
  const base=buildDefault();
  if(s&&s.trees){
    Object.keys(base.trees).forEach(id=>{if(s.trees[id])base.trees[id]={...base.trees[id],...s.trees[id],id,rang:base.trees[id].rang,col:base.trees[id].col};});
    Object.keys(s.trees).forEach(id=>{if(!base.trees[id])base.trees[id]=s.trees[id];});
  }
  base.especes=Array.from(new Set(ESPECES_BASE.concat((s&&s.especes)||[]).concat(Object.values(base.trees).map(t=>t.espece)))).filter(Boolean);
  Object.values(base.trees).forEach(t=>{if(!Array.isArray(t.events))t.events=[];});
  if(s&&s.meta)base.meta={...base.meta,...s.meta};
  base.meta.version=2;
  return base;
}
function saveLocal(){try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch(e){}}
function loadLocal(){try{const r=localStorage.getItem(LS_KEY);if(r){const s=JSON.parse(r);if(s&&s.trees)return normalize(s);}}catch(e){}return buildDefault();}

function setSync(kind){
  const el=document.getElementById("syncBadge");
  const map={ok:["sync ok","✓ Synchronisé"],busy:["sync busy","↻ Synchronisation…"],
    off:["sync off","○ Local — connecter Dropbox"],err:["sync err","⚠ Sync impossible (local OK)"]};
  const m=map[kind]||map.off;el.className=m[0];el.textContent=m[1];
}
function persist(){state.meta.maj=new Date().toISOString();saveLocal();scheduleSync();}
function scheduleSync(){if(!DBX.connected){setSync("off");return;}setSync("busy");clearTimeout(syncTimer);syncTimer=setTimeout(doSync,1400);}
async function doSync(){if(!DBX.connected){setSync("off");return;}try{await DBX.upload(JSON.stringify(state));setSync("ok");}catch(e){setSync("err");}}
async function initRemote(){
  if(!DBX.connected){setSync("off");return;}
  setSync("busy");
  try{
    const txt=await DBX.download();
    if(txt){const s=JSON.parse(txt);if(s&&s.trees){state=normalize(s);saveLocal();render();}}
    else{await DBX.upload(JSON.stringify(state));}
    setSync("ok");
  }catch(e){setSync("err");}
}

/* ===================== Rendu ===================== */
function accent(t){
  if(mode==="espece")return ESP_COLOR[t.espece]||"var(--preciser)";
  if(mode==="campagne")return curCampMap[(t.anneePlantation||"").trim()]||"var(--preciser)";
  if(mode==="statut")return "var("+(STATUT_COLOR[t.statut]||"--leaf")+")";
  if(t.statut==="À surveiller")return "var(--watch)";
  if(t.statut==="À remplacer")return "var(--replace)";
  if(t.statut==="Mort")return "var(--dead)";
  return "var(--line)";
}
function render(){curCampMap=campMap();document.getElementById("filter").innerHTML="";renderLegend();renderStats();renderList();renderAlerts();}
function renderStats(){
  const t=Object.values(state.trees);
  document.getElementById("stats").innerHTML=
    stat(t.length,"Arbres")
    +stat(t.filter(x=>x.rgf).length,"RGF")
    +stat(t.filter(x=>x.statut==="À surveiller").length,"À surveiller","watch")
    +stat(t.filter(x=>x.statut==="À remplacer").length,"À remplacer","replace");
}
function stat(n,l,cls){return "<div class='stat "+(cls||"")+"'><b>"+n+"</b><span>"+l+"</span></div>";}
function renderFilter(){
  const box=document.getElementById("filter");
  const cnt={};Object.values(state.trees).forEach(t=>cnt[t.espece]=(cnt[t.espece]||0)+1);
  const esps=state.especes.filter(e=>cnt[e]);
  let h="<button class='fchip"+(filterEsp===null?" on":"")+"' data-e=''>Tous ("+Object.values(state.trees).length+")</button>";
  h+=esps.map(e=>"<button class='fchip"+(filterEsp===e?" on":"")+"' data-e='"+esc(e)+"'>"+esc(e)+" ("+cnt[e]+")</button>").join("");
  box.innerHTML=h;
  box.querySelectorAll(".fchip").forEach(el=>el.onclick=()=>{filterEsp=el.dataset.e||null;render();});
}
function renderLegend(){
  const L=document.getElementById("legend");
  if(mode==="espece")L.innerHTML=state.especes.filter(e=>Object.values(state.trees).some(t=>t.espece===e)).map(e=>"<span><i style='background:"+(ESP_COLOR[e]||"var(--preciser)")+"'></i>"+esc(e)+"</span>").join("");
  else if(mode==="campagne")L.innerHTML=Object.keys(curCampMap).sort((a,b)=>campKey(a)-campKey(b)).map(c=>"<span><i style='background:"+curCampMap[c]+"'></i>"+esc(c)+"</span>").join("");
  else if(mode==="statut")L.innerHTML=STATUTS.map(s=>"<span><i style='background:var("+STATUT_COLOR[s]+")'></i>"+s+"</span>").join("");
  else L.innerHTML="<span><i style='background:var(--watch)'></i>À surveiller</span><span><i style='background:var(--replace)'></i>À remplacer</span><span><i style='background:var(--dead)'></i>Mort</span>";
}
function card(t){
  const dim=(mode==="alertes"&&(t.statut==="Vivant"||t.statut==="Remplacé"))?" dim":"";
  const sc="var("+(STATUT_COLOR[t.statut]||"--leaf")+")";
  const rgf=t.rgf?"<span class='rgf'>RGF</span>":"";
  const rec=t.fenetre?"<div class='rec'>"+esc(t.fenetre)+"</div>":"";
  return "<div class='card"+dim+"' data-id='"+t.id+"' style='border-left-color:"+accent(t)+"'>"
    +"<div class='ref'>"+t.id+"</div>"
    +"<div class='main'><div class='nm'>"+esc(t.variete)+rgf+"</div>"
    +"<div class='meta'>"+esc(t.espece)+(t.anneePlantation?" · "+esc(t.anneePlantation):"")+(t.statut!=="Vivant"?" · "+t.statut:"")+"</div></div>"
    +rec+"<div class='sdot' style='background:"+sc+"'></div></div>";
}
function tileColor(t){
  const repl=(mode==="statut"||mode==="alertes")&&t.statut==="Remplacé";
  if(mode==="espece")return ESP_HEX[t.espece]||"#A8A090";
  if(mode==="campagne")return curCampMap[(t.anneePlantation||"").trim()]||"#A8A090";
  if(mode==="statut")return repl?"#3F6B3A":(STATUT_HEX[t.statut]||"#3F6B3A");
  if(!repl){
    if(t.statut==="À surveiller")return "#D98A00";
    if(t.statut==="À remplacer")return "#8A6FB0";
    if(t.statut==="Mort")return "#8E8678";
  }
  return "#7FA277";
}
function renderList(){
  const box=document.getElementById("list");
  let h="<div class='cols'>";
  RANGS.forEach(r=>{
    const trees=Object.values(state.trees).filter(t=>t.rang===r).sort((a,b)=>a.col-b.col);
    h+="<div class='col'><div class='colhead'>Rangée "+r+" <span class='n'>· "+trees.length+"</span></div>";
    trees.forEach(t=>{
      const dim=(mode==="alertes"&&(t.statut==="Vivant"||t.statut==="Remplacé"))?" dim":"";
      h+="<div class='tile"+dim+"' data-id='"+t.id+"' style='background:"+tileColor(t)+"'>"
        +"<div class='top'><span class='tcode'>"+t.id+"</span>"+(t.rgf?"<span class='trgf'>RGF</span>":"")+"</div>"
        +"<div class='tname'>"+esc(t.variete)+"</div>"
        +(t.fenetre?"<div class='tsub'>récolte "+esc(t.fenetre)+"</div>":"")
        +"</div>";
    });
    h+="</div>";
  });
  h+="</div>";
  box.innerHTML=h;
  box.querySelectorAll(".tile[data-id]").forEach(el=>el.onclick=()=>openSheet(el.dataset.id));
}
function renderAlerts(){
  const box=document.getElementById("alertChips");
  const f=Object.values(state.trees).filter(x=>x.statut!=="Vivant"&&x.statut!=="Remplacé").sort((a,b)=>a.rang===b.rang?a.col-b.col:a.rang.localeCompare(b.rang));
  if(!f.length){box.innerHTML="<span class='muted'>Aucun arbre signalé. Touchez un arbre pour ajouter une observation.</span>";return;}
  box.innerHTML=f.map(x=>"<button class='chip' data-id='"+x.id+"'><span class='pip' style='background:var("+(STATUT_COLOR[x.statut]||"--leaf")+")'></span><b>"+x.id+"</b> "+esc(x.variete)+" — "+x.statut+"</button>").join("");
  box.querySelectorAll(".chip").forEach(el=>el.onclick=()=>openSheet(el.dataset.id));
}

      <button class="btn primary" id="addBtn">Enregistrer l'observation</button>

  document.getElementById("fStatut").onchange=e=>{t.statut=e.target.value;persist();render();};
  document.getElementById("fFenetre").onchange=e=>{t.fenetre=e.target.value.trim();persist();render();};
  document.getElementById("fAnnee").onchange=e=>{t.anneePlantation=e.target.value.trim();persist();};
  document.getElementById("fRgf").onchange=e=>{t.rgf=e.target.value==="oui";persist();render();openSheet(id);};
  document.getElementById("fEspece").onchange=e=>{
    const val=e.target.value;
    if(val==="__add__"){const name=(prompt("Nouvelle espèce :")||"").trim();if(!name){openSheet(id);return;}if(!state.especes.includes(name))state.especes.push(name);t.espece=name;}

  };

function renderEvents(){
  const t=state.trees[currentId],list=document.getElementById("evList");
  const evs=[...t.events].map((e,i)=>({e,i})).reverse();
  if(!evs.length){list.innerHTML="<p class='none'>Aucun événement pour l'instant.</p>";return;}
  list.innerHTML=evs.map(o=>{
    const e=o.e,c=TYPE_COLOR[e.type]||"#6B6457",when=e.date?fmtDate(e.date):"sans date";
    return `<div class="ev"><div class="when">${when}</div><div class="what"><span class="type-pip" style="background:${c}">${esc(e.type)}</span><span>${esc(e.desc||"")}</span></div><button class="del" data-i="${o.i}">supprimer</button></div>`;
  }).join("");
  list.querySelectorAll(".del").forEach(el=>el.onclick=()=>{if(confirm("Supprimer cet événement ?")){t.events.splice(+el.dataset.i,1);persist();renderEvents();}});
}
function addEvent(){
  const t=state.trees[currentId];
  const date=document.getElementById("aDate").value,type=document.getElementById("aType").value,desc=document.getElementById("aDesc").value.trim();
  if(!desc && !confirm("Description vide. Enregistrer quand même ?"))return;
  t.events.push({date,type,desc});
  if(type==="Remplacement")t.statut="Remplacé";
  else if((type==="Maladie / Chancre"||type==="Blessure")&&t.statut==="Vivant")t.statut="À surveiller";
  persist();document.getElementById("aDesc").value="";renderEvents();render();
  const sel=document.getElementById("fStatut");if(sel)sel.value=t.statut;
}
function closeSheet(){document.getElementById("scrim").classList.remove("open");document.getElementById("sheet").classList.remove("open");currentId=null;}

function addTree(){
  let rang=(prompt("Rangée ? (A ou B)","A")||"").trim().toUpperCase();
  if(rang!=="A"&&rang!=="B"){if(rang)alert("Indiquez A ou B.");return;}
  const name=(prompt("Nom de la variété du nouvel arbre :")||"").trim();
  if(!name)return;
  let max=0;Object.values(state.trees).forEach(t=>{if(t.rang===rang)max=Math.max(max,t.col);});
  const col=max+1,id=rang+col;
  state.trees[id]={id,rang,col,variete:name,espece:"À préciser",fenetre:"",rgf:false,statut:"Vivant",anneePlantation:"",events:[]};
  persist();render();openSheet(id);
}

/* ===================== Sauvegarde manuelle ===================== */
function doExport(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="verger-moutons-"+new Date().toISOString().slice(0,10)+".json";
  document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1500);
}
function doImportFile(file){
  const r=new FileReader();
  r.onload=()=>{try{const s=JSON.parse(r.result);if(!s||!s.trees)throw 0;state=normalize(s);persist();render();alert("Données importées.");}
    catch(e){alert("Fichier illisible. Choisissez un verger-moutons-….json exporté par cette appli.");}};
  r.readAsText(file);
}

/* ===================== Utilitaires ===================== */
function esc(s){return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
function fmtDate(d){if(/^\d{4}$/.test(d))return d;const mm=/^(\d{4})-(\d{2})$/.exec(d);if(mm)return mm[2]+"/"+mm[1];const m=/^(\d{4})-(\d{2})-(\d{2})/.exec(d);return m?m[3]+"/"+m[2]+"/"+m[1]:d;}

/* ===================== Init ===================== */

    b.onclick=()=>{mode=b.dataset.mode;document.querySelectorAll("#modeSeg button").forEach(x=>x.classList.toggle("on",x===b));render();};
  });
  document.getElementById("btnAdd").onclick=addTree;
  document.getElementById("btnSettings").onclick=openSettings;
  document.getElementById("syncBadge").onclick=openSettings;
  document.getElementById("btnPDF").onclick=exportPDF;
  document.getElementById("btnExport").onclick=doExport;
  document.getElementById("btnImport").onclick=()=>document.getElementById("fileInput").click();
  document.getElementById("fileInput").onchange=e=>{if(e.target.files[0])doImportFile(e.target.files[0]);e.target.value="";};
  document.getElementById("btnReset").onclick=()=>{if(confirm("Réinitialiser à partir de la liste d'origine ? Les saisies non synchronisées seront perdues.")){state=buildDefault();persist();render();}};
  document.getElementById("scrim").onclick=closeSheet;
  document.getElementById("scrim2").onclick=closeSettings;
  document.getElementById("foot").textContent="Deux rangées (A / B), positions attribuées par colonne d'origine. « Récolte » = (mois de cueillette – mois de conservation en cave). RGF = ressource génétique fruitière. Synchro Dropbox automatique ; fichier séparé de votre premier verger.";
  initRemote();
}
init();
</script>
</body>
</html>
